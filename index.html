<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoloPS</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    overflow-x: hidden;
    color: white;
}

/* Background RGB + animasi */
body {
    background: linear-gradient(-45deg, #ff0000, #00ff00, #0000ff, #00ffff);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

/* Particle canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Container */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* Title */
h1 {
    font-size: 48px;
    text-shadow: 0 0 25px white;
    animation: fadeDown 1s ease;
}

/* Glass box */
.box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
    animation: fadeUp 1s ease;
}

/* Status */
.status {
    color: lime;
    font-weight: bold;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 1 }
    50% { opacity: 0.4 }
    100% { opacity: 1 }
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    background: linear-gradient(45deg, cyan, blue);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px cyan;
}

/* Link */
a {
    color: cyan;
    text-decoration: none;
    display: block;
    margin-top: 10px;
}

/* Copy notif */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: 0.5s;
}

/* Animasi */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}

@keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px);}
    to { opacity: 1; transform: translateY(0);}
}

/* Mobile */
@media(max-width:600px){
    h1 { font-size: 32px; }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
    <h1>SoloPS</h1>

    <p>
        SoloPS adalah server GTPS Solo dengan fitur modern, stabil,
        dan komunitas aktif. Rasakan pengalaman bermain yang berbeda!
    </p>

    <div class="box">
        <h2>Status Server</h2>
        <p class="status">● ONLINE</p>
        <p>👥 Player Online: <span id="player">0</span></p>
    </div>

    <div class="box">
        <h2>Download VHost</h2>
        <a href="https://www.mediafire.com/file/zvjgcyluhjtzl73/sologtps.txt/file" target="_blank">
            Download Sekarang
        </a>
    </div>

    <div class="box">
        <h2>Ptunnel</h2>
        <button onclick="copyText('https://dash.gtps.cloud/android/4225')">
            Copy Ptunnel
        </button>
    </div>

    <div class="box">
        <h2>Windows Host</h2>
        <button onclick="copyText(`91.134.85.13 growtopia1.com
91.134.85.13 growtopia2.com
91.134.85.13 www.growtopia1.com
91.134.85.13 www.growtopia2.com`)">
            Copy Host
        </button>
    </div>
</div>

<div class="toast" id="toast">Berhasil di copy!</div>

<script>
/* Copy modern */
function copyText(text){
    navigator.clipboard.writeText(text);
    const toast = document.getElementById("toast");
    toast.style.opacity = "1";
    setTimeout(()=> toast.style.opacity="0",1500);
}

/* Fake player counter */
let player = document.getElementById("player");
setInterval(()=>{
    player.innerText = Math.floor(Math.random()*200)+50;
},2000);

/* Particle background */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx: Math.random()-0.5,
        dy: Math.random()-0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
